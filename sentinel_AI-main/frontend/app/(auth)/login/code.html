<style>
        body {
            background-color: #010101; /* Obsidian Dark */
            color: #e0e2ed;
        }
        .glass-panel {
            background-color: #1C1C1E; /* Dark Graphite */
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-panel-level2 {
            background-color: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .glow-hover:hover {
            box-shadow: 0 0 15px rgba(62, 144, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background-color: #0A0A0A;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .input-field:focus {
            border-color: #3e90ff; /* Primary Blue */
            box-shadow: 0 0 0 2px rgba(62, 144, 255, 0.2);
            outline: none;
        }
        .btn-primary {
            background-color: #3e90ff; /* Primary Blue */
            color: #ffffff;
        }
        .btn-ghost {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        /* Loading animation for button */
        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .is-loading .loading-spinner {
            display: inline-block;
        }
        .is-loading .btn-text {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-md md:p-lg relative overflow-hidden font-body-md text-body-md antialiased">
<!-- Background Texture/Gradient for depth -->
<div class="absolute inset-0 z-0 pointer-events-none" style="background: radial-gradient(circle at 50% 0%, rgba(62, 144, 255, 0.05) 0%, transparent 70%);"></div>
<!-- Login Container -->
<main class="w-full max-w-md glass-panel-level2 rounded-xl p-lg md:p-xl z-10 shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative">
<!-- Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center mb-sm border border-primary/20">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-display-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">SentinelAI</h1>
<p class="font-body-sm text-on-surface-variant mt-xs">Secure Command Access</p>
</div>
<!-- Role Selection -->
<div aria-label="Role Selection" class="flex bg-surface-container-low rounded-lg p-xs mb-lg border border-white/5" role="tablist">
<button aria-selected="true" class="flex-1 py-sm rounded-md font-label-md text-label-md bg-surface-variant text-on-surface shadow-sm transition-all text-center border border-white/5" id="tab-police" role="tab">
                Police
            </button>
<button aria-selected="false" class="flex-1 py-sm rounded-md font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-all text-center border border-transparent hover:bg-white/5" id="tab-citizen" role="tab">
                Citizen
            </button>
<button aria-selected="false" class="flex-1 py-sm rounded-md font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-all text-center border border-transparent hover:bg-white/5" id="tab-gov" role="tab">
                Government
            </button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md" id="loginForm">
<!-- Username / Badge ID -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="identifier">Badge ID / Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">badge</span>
<input aria-required="true" class="input-field w-full h-10 rounded-lg pl-xl pr-sm text-on-surface font-body-md transition-colors" id="identifier" placeholder="Enter your ID" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors focus:outline-none focus:ring-1 focus:ring-primary rounded" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">lock</span>
<input aria-required="true" class="input-field w-full h-10 rounded-lg pl-xl pr-xl text-on-surface font-body-md transition-colors" id="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface focus:outline-none" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[18px]" id="visibilityIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="btn-primary w-full h-10 rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm mt-sm transition-all glow-hover focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" id="loginBtn" type="submit">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="btn-text">Secure Login</span>
<div class="loading-spinner"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-lg">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or access with</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Secondary Actions -->
<div class="flex flex-col gap-sm">
<button class="btn-ghost w-full h-10 rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm transition-all hover:bg-white/5 focus:outline-none focus:ring-1 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-[18px]">fingerprint</span>
                Biometric Login
            </button>
<button class="btn-ghost w-full h-10 rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm transition-all hover:bg-white/5 focus:outline-none focus:ring-1 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-[18px]">account_balance</span>
                Sign in with Government SSO
            </button>
</div>
</main>
<!-- Footer -->
<footer class="mt-xl text-center z-10">
<div class="flex items-center justify-center gap-md font-label-sm text-label-sm text-on-surface-variant">
<a class="hover:text-on-surface transition-colors focus:outline-none focus:underline" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-on-surface-variant/50"></span>
<a class="hover:text-on-surface transition-colors focus:outline-none focus:underline" href="#">Terms of Service</a>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant/50 mt-sm">© 2024 SentinelAI Public Safety Systems</p>
</footer>
<script>
        // Password Visibility Toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');
        const visibilityIcon = document.getElementById('visibilityIcon');

        toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        });

        // Mock Login Flow
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Basic validation
            if(!document.getElementById('identifier').value || !document.getElementById('password').value) return;

            // Set loading state
            loginBtn.classList.add('is-loading');
            loginBtn.setAttribute('disabled', 'true');
            loginBtn.style.opacity = '0.8';
            loginBtn.style.cursor = 'not-allowed';

            // Simulate API call
            setTimeout(() => {
                loginBtn.classList.remove('is-loading');
                loginBtn.removeAttribute('disabled');
                loginBtn.style.opacity = '1';
                loginBtn.style.cursor = 'pointer';
                
                // Add success state visually (briefly)
                const originalBg = loginBtn.style.backgroundColor;
                loginBtn.style.backgroundColor = '#4ade80'; // A generic success green just for visual feedback before "redirect"
                loginBtn.querySelector('.btn-text').textContent = 'Authenticated';
                loginBtn.querySelector('.material-symbols-outlined').textContent = 'check_circle';
                
                setTimeout(() => {
                    // Reset for demo purposes
                    loginBtn.style.backgroundColor = '';
                    loginBtn.querySelector('.btn-text').textContent = 'Secure Login';
                    loginBtn.querySelector('.material-symbols-outlined').textContent = 'login';
                    loginForm.reset();
                }, 1500);

            }, 2000);
        });

        // Tab Switching Logic (Visual only for demo)
        const tabs = document.querySelectorAll('[role="tab"]');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Reset all tabs
                tabs.forEach(t => {
                    t.setAttribute('aria-selected', 'false');
                    t.className = 'flex-1 py-sm rounded-md font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-all text-center border border-transparent hover:bg-white/5';
                });
                
                // Set active tab
                tab.setAttribute('aria-selected', 'true');
                tab.className = 'flex-1 py-sm rounded-md font-label-md text-label-md bg-surface-variant text-on-surface shadow-sm transition-all text-center border border-white/5';
                
                // Update placeholder based on role
                const idInput = document.getElementById('identifier');
                if(tab.id === 'tab-police') {
                    idInput.placeholder = 'Enter Badge ID';
                    document.querySelector('label[for="identifier"]').textContent = 'Badge ID';
                } else if (tab.id === 'tab-citizen') {
                    idInput.placeholder = 'Enter National ID';
                    document.querySelector('label[for="identifier"]').textContent = 'National ID';
                } else {
                    idInput.placeholder = 'Enter Gov ID';
                    document.querySelector('label[for="identifier"]').textContent = 'Government ID';
                }
            });
        });
    </script>
</body></html>
